<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="assets/demo-base.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumulus Mobile — Mortgage APP-2847</title>
    <link rel="icon" href="assets/cumulus-icon.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.20.15/babel.min.js"></script>
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Montserrat, system-ui, sans-serif; background: #d1d5db; }
        .phone-stage { height: 100vh; height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        .phone-frame {
            width: 390px; height: min(844px, calc(100dvh - 20px)); max-height: calc(100dvh - 20px);
            border-radius: 48px; border: 12px solid #1a1a1a; background: #000;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.45); overflow: hidden; display: flex; flex-direction: column;
        }
        .phone-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; background: #000; border-radius: 36px; }
        .ios-lock-wallpaper {
            background:
                radial-gradient(ellipse 90% 70% at 15% 10%, rgba(0, 163, 161, 0.35), transparent 55%),
                radial-gradient(ellipse 80% 60% at 85% 85%, rgba(30, 90, 140, 0.55), transparent 50%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(7, 42, 63, 0.4), transparent),
                linear-gradient(168deg, #2a6a8a 0%, #0B3D5C 28%, #062535 62%, #0a2840 100%);
        }
        .dynamic-island {
            width: 126px; height: 37px; background: #000; border-radius: 22px;
            margin: 10px auto 0; box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
        }
        .ios-notification {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(28px) saturate(190%);
            -webkit-backdrop-filter: blur(28px) saturate(190%);
            border-radius: 20px;
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.22),
                0 1px 0 rgba(255, 255, 255, 0.65) inset,
                0 0 0 0.5px rgba(255, 255, 255, 0.25);
        }
        .ios-notification.entering {
            animation: iosNotifIn 0.72s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes iosNotifIn {
            0% { opacity: 0; transform: translateY(-36px) scale(0.86); filter: blur(6px); }
            45% { opacity: 1; transform: translateY(8px) scale(1.025); filter: blur(0); }
            70% { transform: translateY(-3px) scale(0.995); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        .ios-lock-time {
            font-size: 82px; font-weight: 200; letter-spacing: -3px; line-height: 1;
            color: rgba(255,255,255,0.92);
            text-shadow: 0 2px 24px rgba(0,0,0,0.25);
        }
        .lock-control {
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(0,0,0,0.38); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .home-indicator {
            width: 134px; height: 5px; background: rgba(255,255,255,0.88);
            border-radius: 100px; margin: 0 auto 10px;
        }
        .home-indicator-dark { background: rgba(0,0,0,0.28); }
        .agent-fab {
            box-shadow: 0 12px 32px rgba(11, 61, 92, 0.45), 0 0 0 3px rgba(0, 163, 161, 0.35);
            animation: fabPulse 2.4s ease-in-out infinite;
        }
        @keyframes fabPulse {
            0%, 100% { box-shadow: 0 12px 32px rgba(11, 61, 92, 0.45), 0 0 0 3px rgba(0, 163, 161, 0.35); }
            50% { box-shadow: 0 16px 40px rgba(0, 163, 161, 0.5), 0 0 0 5px rgba(0, 163, 161, 0.2); }
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .ios-keyboard {
            background: #d1d5db; border-top: 1px solid #b8bcc0; padding: 6px 4px 24px;
            flex-shrink: 0;
        }
        .ios-key { background: #fff; border-radius: 5px; box-shadow: 0 1px 0 #898a8d; font-size: 17px; font-weight: 400; }
        .chat-input-mock { background: #fff; border: 1px solid #c7c7cc; border-radius: 20px; min-height: 36px; transition: border-color 0.15s, box-shadow 0.15s; position: relative; }
        .chat-input-mock.is-active {
            border-color: #00A3A1;
            box-shadow: 0 0 0 2px rgba(0, 163, 161, 0.15);
        }
        .chat-input-faux {
            width: 100%;
            min-height: 20px;
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            font-size: 13px;
            line-height: 1.35;
        }
        .chat-input-value {
            color: #111827;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .chat-input-placeholder {
            color: #9ca3af;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-input-mock.is-active .chat-input-faux:has(.chat-input-placeholder)::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: #007AFF;
            border-radius: 1px;
            flex-shrink: 0;
            margin-right: 3px;
            vertical-align: middle;
            box-shadow: 0 0 0 1px rgba(0, 122, 255, 0.25);
            animation: caretBlink 1s ease-in-out infinite;
        }
        .chat-input-mock.is-active .chat-input-value::after {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: #007AFF;
            border-radius: 1px;
            margin-left: 3px;
            vertical-align: text-bottom;
            box-shadow: 0 0 0 1px rgba(0, 122, 255, 0.25);
            animation: caretBlink 1s ease-in-out infinite;
        }
        @keyframes caretBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }
        .typing-dot { animation: typingBounce 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AGENT_ICON = 'assets/cumulus-icon.png';
        const AGENTFORCE_ICON = 'assets/agentforce_icon.webp';
        const WA_LINK = 'agenticWhatsappCumulusMortgageEN.html?from=mobile';
        const TYPING_BASE_MS = 32;
        const TYPING_JITTER_MS = 20;
        const AI_REPLY_DELAY_MS = 2400;
        const CHAT_CONNECT_MS = 1600;

        const CALL_RECAP = {
            advisor: 'David Martinez',
            duration: '18 min',
            when: 'Today · 2:15 PM',
            bullets: [
                'First-time buyers · Marcus & Emily · Austin area',
                'Conventional 30-yr on **APP-2847** · pre-qual ~**$425K**',
                '10% down discussed · PMI until ~20% equity',
                'Closing costs ~$8–12K · Premier assistance possible',
                'Target closing **mid-September** · CUMULUS26 noted',
            ],
        };

        const INITIAL_LOAN = {
            termYears: 30,
            monthlyPayment: 2640,
            downPct: 10,
            rate: 6.0,
            loanAmount: 425000,
            label: 'From your call with David',
        };

        function fmtMoney(n) { return '$' + n.toLocaleString(); }

        function StatusBar({ dark }) {
            return (
                <div className={`shrink-0 px-6 pt-1 pb-0 flex justify-between items-center text-[15px] font-semibold tracking-tight ${dark ? 'text-white' : 'text-gray-900'}`}>
                    <span>9:41</span>
                    <span className="flex items-center gap-[5px] text-[13px]">
                        <i className="fa-solid fa-signal"></i>
                        <i className="fa-solid fa-wifi"></i>
                        <span className="inline-flex items-center gap-0.5">
                            <i className="fa-solid fa-battery-full text-[15px]"></i>
                        </span>
                    </span>
                </div>
            );
        }

        function DynamicIsland() {
            return <div className="dynamic-island shrink-0" aria-hidden="true" />;
        }

        function HomeIndicator({ dark }) {
            return <div className={`home-indicator shrink-0 ${dark ? 'home-indicator-dark' : ''}`} aria-hidden="true" />;
        }

        function LoanSummaryCard({ loan }) {
            return (
                <div className="mx-3 mt-2 mb-2 bg-white rounded-xl border border-[#b8e6e3] shadow-sm p-3 fade-in">
                    <div className="flex justify-between items-start gap-2">
                        <div>
                            <p className="text-[9px] font-bold text-[#00A3A1] uppercase tracking-wide">APP-2847 · Live estimate</p>
                            <p className="text-xl font-bold text-[#0B3D5C] mt-0.5">{fmtMoney(loan.monthlyPayment)}<span className="text-xs font-normal text-gray-500">/mo</span></p>
                        </div>
                        <div className="text-right text-[10px] text-gray-500">
                            <p>{loan.termYears}-yr fixed</p>
                            <p>{loan.rate}% APR</p>
                        </div>
                    </div>
                    <div className="flex gap-3 mt-2 pt-2 border-t border-gray-100 text-[10px] text-gray-600">
                        <span><strong>{loan.downPct}%</strong> down</span>
                        <span><strong>{fmtMoney(loan.loanAmount)}</strong> loan</span>
                    </div>
                    <p className="text-[9px] text-gray-400 mt-1.5">{loan.label}</p>
                </div>
            );
        }

        function IOSKeyboard() {
            const rows = [
                ['Q','W','E','R','T','Y','U','I','O','P'],
                ['A','S','D','F','G','H','J','K','L'],
                ['⇧','Z','X','C','V','B','N','M','⌫'],
            ];
            return (
                <div className="ios-keyboard">
                    {rows.map((row, ri) => (
                        <div key={ri} className="flex justify-center gap-[5px] mb-[6px] px-1">
                            {row.map((k, ki) => (
                                <span key={ki} className={`ios-key flex items-center justify-center text-gray-900 ${k.length > 1 ? 'px-3 min-w-[28px]' : 'w-[31px] h-[42px]'}`}>{k}</span>
                            ))}
                        </div>
                    ))}
                    <div className="flex gap-[5px] px-1">
                        <span className="ios-key flex-1 h-[42px] flex items-center justify-center text-sm text-gray-600">space</span>
                        <span className="ios-key w-16 h-[42px] flex items-center justify-center text-sm font-semibold text-blue-600">return</span>
                    </div>
                </div>
            );
        }

        function PushScreen({ onOpen }) {
            const [showNotif, setShowNotif] = useState(false);

            useEffect(() => {
                const t = setTimeout(() => setShowNotif(true), 800);
                return () => clearTimeout(t);
            }, []);

            return (
                <div className="ios-lock-wallpaper flex-1 flex flex-col min-h-0">
                    <DynamicIsland />
                    <StatusBar dark />

                    <div className="text-center pt-1 shrink-0">
                        <p className="text-white/80 text-[15px] font-medium">Tuesday, June 9</p>
                        <p className="ios-lock-time mt-1">9:41</p>
                    </div>

                    <div className="flex-1 flex items-center justify-center px-5 min-h-0">
                        {showNotif && (
                            <button type="button" onClick={onOpen}
                                className="ios-notification entering w-full max-w-[348px] p-3.5 flex gap-3 text-left active:scale-[0.97] transition-transform duration-150">
                                <img src={AGENT_ICON} alt="" className="w-11 h-11 rounded-[12px] object-contain bg-white p-1 shrink-0 shadow-sm" />
                                <div className="flex-1 min-w-0 pt-0.5">
                                    <div className="flex justify-between items-baseline gap-2 mb-0.5">
                                        <span className="text-[13px] font-semibold text-gray-900">CUMULUS</span>
                                        <span className="text-[12px] text-gray-500 shrink-0">now</span>
                                    </div>
                                    <p className="text-[15px] font-semibold text-gray-900 leading-snug">Your call summary is ready</p>
                                    <p className="text-[14px] text-gray-600 leading-snug mt-0.5 line-clamp-2">David Martinez · APP-2847 · tap to open</p>
                                </div>
                            </button>
                        )}
                    </div>

                    <div className="shrink-0 px-12 pb-1 flex justify-between items-center">
                        <div className="lock-control flex items-center justify-center">
                            <i className="fa-solid fa-flashlight text-white/90 text-[17px]"></i>
                        </div>
                        <div className="lock-control flex items-center justify-center">
                            <i className="fa-solid fa-camera text-white/90 text-[17px]"></i>
                        </div>
                    </div>
                    <HomeIndicator />
                    <p className="text-center text-white/45 text-[9px] pb-2 shrink-0">Tap notification or press any key</p>
                </div>
            );
        }

        function CallRecapScreen({ onContinue }) {
            return (
                <div className="flex-1 flex flex-col bg-[#f2f2f7] overflow-hidden min-h-0 relative">
                    <DynamicIsland />
                    <StatusBar dark={false} />
                    <div className="bg-white/90 backdrop-blur border-b border-gray-200/80 px-4 py-2.5 shrink-0">
                        <div className="flex items-center gap-2">
                            <button type="button" className="text-[#007AFF] text-sm w-8"><i className="fa-solid fa-chevron-left"></i></button>
                            <div className="flex-1 text-center pr-8">
                                <p className="text-[15px] font-semibold text-gray-900">Call summary</p>
                                <p className="text-[11px] text-gray-500">Cumulus · synced from phone call</p>
                            </div>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 pb-28 min-h-0">
                        <div className="bg-white rounded-[14px] p-4 shadow-sm fade-in">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="w-12 h-12 rounded-full bg-[#0B3D5C] flex items-center justify-center text-white shadow-md">
                                    <i className="fa-solid fa-phone text-lg"></i>
                                </div>
                                <div>
                                    <p className="font-semibold text-[15px] text-gray-900">{CALL_RECAP.advisor}</p>
                                    <p className="text-[13px] text-gray-500">Loan specialist · {CALL_RECAP.duration}</p>
                                    <p className="text-[11px] text-gray-400">{CALL_RECAP.when}</p>
                                </div>
                            </div>
                            <p className="text-[11px] text-gray-400 mb-2.5 font-semibold uppercase tracking-wide">Discussed on the call</p>
                            <ul className="space-y-2.5">
                                {CALL_RECAP.bullets.map((b, i) => (
                                    <li key={i} className="text-[14px] text-gray-700 flex gap-2 leading-snug">
                                        <span className="text-[#00A3A1] shrink-0 mt-0.5">•</span>
                                        <span dangerouslySetInnerHTML={{ __html: b.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>') }} />
                                    </li>
                                ))}
                            </ul>
                        </div>
                        <p className="text-[12px] text-gray-500 mt-4 text-center leading-relaxed px-2">
                            Covered by phone — Agentforce can help you <strong>adjust term &amp; payment</strong> next.
                        </p>
                    </div>

                    <div className="absolute bottom-0 left-0 right-0 pb-2 pt-6 bg-gradient-to-t from-[#f2f2f7] via-[#f2f2f7] to-transparent pointer-events-none">
                        <div className="flex justify-center pointer-events-auto">
                            <button type="button" onClick={onContinue} aria-label="Open Agentforce"
                                className="agent-fab w-[68px] h-[68px] rounded-full bg-[#0B3D5C] flex items-center justify-center active:scale-95 transition-transform">
                                <img src={AGENTFORCE_ICON} alt="Agentforce" className="w-10 h-10 object-contain" />
                            </button>
                        </div>
                        <p className="text-center text-[10px] text-gray-400 mt-3 pointer-events-none">Tap Agentforce or press any key</p>
                        <HomeIndicator dark />
                    </div>
                </div>
            );
        }

        function App() {
            const [phase, setPhase] = useState('push');
            const [loan, setLoan] = useState(INITIAL_LOAN);
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [isConnecting, setIsConnecting] = useState(false);
            const [isSimulatingInput, setIsSimulatingInput] = useState(false);
            const [keyboardVisible, setKeyboardVisible] = useState(false);
            const [demoStep, setDemoStep] = useState(0);
            const [sessionComplete, setSessionComplete] = useState(false);
            const [waOfferChoice, setWaOfferChoice] = useState(null);
            const [chatGreeted, setChatGreeted] = useState(false);

            const demoStepRef = useRef(0);
            const agentTimeoutRef = useRef(null);
            const typingTimeoutRef = useRef(null);
            const skipTypingRef = useRef(false);
            const demoLockRef = useRef(false);
            const demoTypingStartedRef = useRef(false);
            const isSimulatingRef = useRef(false);
            const isTypingRef = useRef(false);
            const pendingAgentFnRef = useRef(null);
            const typingTextRef = useRef('');
            const typingNextStepRef = useRef(0);
            const typingFlushRef = useRef(false);
            const connectTimeoutRef = useRef(null);
            const chatGreetedRef = useRef(false);
            const phaseRef = useRef('push');
            const stageRef = useRef(null);
            const chatEndRef = useRef(null);

            const AGENT_GREETING = {
                role: 'agent',
                text: 'Hi Marcus — I pulled in your **call with David**. You\'re on **APP-2847**: 30-yr conventional, about **$2,640/mo**.\n\nWant to try a **shorter term** or a **target monthly payment**? I\'ll update your estimate right here — no website needed.',
            };

            useEffect(() => { demoStepRef.current = demoStep; }, [demoStep]);
            useEffect(() => { isSimulatingRef.current = isSimulatingInput; }, [isSimulatingInput]);
            useEffect(() => { isTypingRef.current = isTyping; }, [isTyping]);
            useEffect(() => { chatGreetedRef.current = chatGreeted; }, [chatGreeted]);
            useEffect(() => { phaseRef.current = phase; }, [phase]);
            useEffect(() => {
                if (phase === 'chat') return;
                stageRef.current?.focus({ preventScroll: true });
            }, [phase]);
            useEffect(() => {
                if (phase === 'chat') chatEndRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, [messages, isTyping, inputText, phase, keyboardVisible]);

            useEffect(() => {
                if (phase !== 'chat' || chatGreeted) return;
                setIsConnecting(true);
                connectTimeoutRef.current = setTimeout(() => {
                    connectTimeoutRef.current = null;
                    setIsConnecting(false);
                    setMessages([AGENT_GREETING]);
                    setDemoStep(1);
                    setChatGreeted(true);
                }, CHAT_CONNECT_MS);
                return () => {
                    if (connectTimeoutRef.current) clearTimeout(connectTimeoutRef.current);
                };
            }, [phase, chatGreeted]);

            const completeChatGreeting = () => {
                if (chatGreetedRef.current) return;
                if (connectTimeoutRef.current) {
                    clearTimeout(connectTimeoutRef.current);
                    connectTimeoutRef.current = null;
                }
                setIsConnecting(false);
                setMessages([AGENT_GREETING]);
                setDemoStep(1);
                setChatGreeted(true);
            };

            const queueAgent = (fn) => {
                pendingAgentFnRef.current = fn;
                setIsTyping(true);
                setKeyboardVisible(false);
                if (agentTimeoutRef.current) clearTimeout(agentTimeoutRef.current);
                agentTimeoutRef.current = setTimeout(() => {
                    agentTimeoutRef.current = null;
                    pendingAgentFnRef.current = null;
                    setIsTyping(false);
                    fn();
                }, AI_REPLY_DELAY_MS);
            };

            const skipAgentReply = () => {
                if (!isTypingRef.current || !pendingAgentFnRef.current) return;
                if (agentTimeoutRef.current) {
                    clearTimeout(agentTimeoutRef.current);
                    agentTimeoutRef.current = null;
                }
                const fn = pendingAgentFnRef.current;
                pendingAgentFnRef.current = null;
                setIsTyping(false);
                fn();
            };

            const finishTypingAndSend = (text, nextStep) => {
                if (typingFlushRef.current) return;
                typingFlushRef.current = true;
                skipTypingRef.current = true;
                if (typingTimeoutRef.current) {
                    clearTimeout(typingTimeoutRef.current);
                    typingTimeoutRef.current = null;
                }
                setInputText(text);
                setIsSimulatingInput(false);
                setDemoStep(nextStep);
                demoTypingStartedRef.current = false;
                demoLockRef.current = false;
                sendUserMessage(text);
                queueAgent(triggerAgent);
                typingFlushRef.current = false;
            };

            const sendUserMessage = (text) => {
                setMessages(prev => [...prev, { role: 'user', text }]);
                setInputText('');
                setKeyboardVisible(false);
            };

            const triggerAgent = () => {
                const s = demoStepRef.current;
                if (s === 3) {
                    setLoan({ termYears: 15, monthlyPayment: 3180, downPct: 10, rate: 5.85, loanAmount: 425000, label: 'Updated · 15-yr scenario' });
                    setMessages(prev => [...prev, {
                        role: 'agent',
                        text: 'Good thinking — **15-year fixed** at ~**5.85%** (illustrative):\n\n• Payment **~$3,180/mo** (+$540)\n• Less total interest vs. 30-yr\n• Same **APP-2847** file — Emily sees this too\n\nI updated your estimate above ↑',
                        loanUpdated: true,
                    }]);
                    setDemoStep(4);
                } else if (s === 5) {
                    setLoan({ termYears: 30, monthlyPayment: 2395, downPct: 15, rate: 6.0, loanAmount: 425000, label: 'Updated · 15% down · ~$2,395/mo target' });
                    setMessages(prev => [...prev, {
                        role: 'agent',
                        text: 'To land near **$2,400/mo**, I modeled **15% down** on the 30-yr:\n\n• **~$2,395/mo** estimated P&I + tax/ins.\n• Extra $42,500 down vs. 10%\n\nCheck the card above — still **APP-2847**, ready for Emily to review.',
                        loanUpdated: true,
                    }]);
                    setDemoStep(6);
                } else if (s === 7) {
                    setMessages(prev => [...prev, {
                        role: 'agent',
                        text: 'Absolutely — review together first. 💙\n\nI can send a **WhatsApp recap** with today\'s numbers (call + these scenarios). Not for signing the loan there.',
                        options: ['Yes, send recap on WhatsApp', 'Stay in the app'],
                        type: 'wa_offer',
                    }]);
                    setDemoStep(8);
                } else if (s === 10) {
                    setMessages(prev => [...prev, {
                        role: 'agent',
                        text: 'Done 📱 — recap sent with your **$2,395/mo** scenario. **WhatsApp = updates & David\'s team** when you\'re ready.',
                        type: 'whatsapp_handoff',
                    }]);
                    setDemoStep(11);
                    setSessionComplete(true);
                }
            };

            const startTypingInput = (text, nextStep) => {
                if (demoTypingStartedRef.current || isSimulatingInput || demoLockRef.current) return;
                demoTypingStartedRef.current = true;
                demoLockRef.current = true;
                if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
                typingTextRef.current = text;
                typingNextStepRef.current = nextStep;
                typingFlushRef.current = false;
                setIsSimulatingInput(true);
                setKeyboardVisible(true);
                skipTypingRef.current = false;
                setInputText('');
                let i = 0;
                const typeNext = () => {
                    if (skipTypingRef.current) {
                        finishTypingAndSend(text, nextStep);
                        return;
                    }
                    if (i < text.length) {
                        setInputText(text.slice(0, i + 1));
                        i++;
                        typingTimeoutRef.current = setTimeout(typeNext, TYPING_BASE_MS + Math.random() * TYPING_JITTER_MS);
                    } else {
                        setIsSimulatingInput(false);
                        setDemoStep(nextStep);
                        setTimeout(() => {
                            sendUserMessage(text);
                            demoTypingStartedRef.current = false;
                            demoLockRef.current = false;
                            queueAgent(triggerAgent);
                        }, 350);
                    }
                };
                typeNext();
            };

            const handleWaOffer = (opt) => {
                if (waOfferChoice) return;
                setWaOfferChoice(opt);
                setMessages(prev => [...prev, { role: 'user', text: opt }]);
                if (opt.startsWith('Yes')) {
                    setDemoStep(10);
                    queueAgent(triggerAgent);
                }
            };

            const DEMO_USER_LINES = {
                1: ['What if we went with a 15-year term? Emily wants to pay less interest overall.', 3],
                4: ['Can we get closer to $2,400 a month? We could put 15% down instead.', 5],
                6: ['This helps — Emily and I want to review everything before we talk to David again.', 7],
            };

            const handleDemoKey = () => {
                const p = phaseRef.current;
                if (p === 'push') { setPhase('recap'); return; }
                if (p === 'recap') { setPhase('chat'); return; }
                if (sessionComplete) return;

                const s = demoStepRef.current;
                if (DEMO_USER_LINES[s]) {
                    const [text, next] = DEMO_USER_LINES[s];
                    startTypingInput(text, next);
                    return;
                }
                if (s === 8 && !waOfferChoice) {
                    handleWaOffer('Yes, send recap on WhatsApp');
                }
            };

            useEffect(() => {
                const onKey = (e) => {
                    if (['Control', 'Shift', 'Meta', 'Alt', 'Tab'].includes(e.key)) return;

                    if (isSimulatingRef.current) {
                        e.preventDefault();
                        finishTypingAndSend(typingTextRef.current, typingNextStepRef.current);
                        return;
                    }

                    if (isTypingRef.current) {
                        e.preventDefault();
                        skipAgentReply();
                        return;
                    }

                    if (phaseRef.current === 'chat' && !chatGreetedRef.current) {
                        e.preventDefault();
                        completeChatGreeting();
                        return;
                    }

                    if (sessionComplete) return;
                    e.preventDefault();
                    handleDemoKey();
                };
                window.addEventListener('keydown', onKey, true);
                if (phaseRef.current !== 'chat') stageRef.current?.focus({ preventScroll: true });
                return () => window.removeEventListener('keydown', onKey, true);
            }, [sessionComplete, waOfferChoice]);

            useEffect(() => {
                demoTypingStartedRef.current = false;
                demoLockRef.current = false;
            }, [demoStep]);

            const inputPlaceholder = isConnecting
                ? 'Connecting…'
                : sessionComplete
                    ? 'Continued on WhatsApp'
                    : 'Message Agentforce…';
            const showInputCaret = !sessionComplete && !isConnecting && !isTyping;

            return (
                <div className="phone-stage" ref={stageRef} tabIndex={0} aria-label="Cumulus mobile demo — press arrow keys to advance">
                    <div className="phone-frame">
                        <div className="phone-screen">
                            {phase === 'push' && <PushScreen onOpen={() => setPhase('recap')} />}
                            {phase === 'recap' && <CallRecapScreen onContinue={() => setPhase('chat')} />}
                            {phase === 'chat' && (
                                <div className="flex-1 flex flex-col bg-[#f2f2f7] overflow-hidden min-h-0 relative">
                                    <DynamicIsland />
                                    <StatusBar dark={false} />
                                    <div className="bg-white border-b border-gray-200/80 px-4 py-2.5 flex items-center gap-2 shrink-0">
                                        <img src={AGENTFORCE_ICON} alt="" className="w-8 h-8 object-contain" />
                                        <div>
                                            <p className="text-[15px] font-semibold text-gray-900 leading-tight">Agentforce</p>
                                            <p className="text-[11px] text-gray-500">In-app · APP-2847</p>
                                        </div>
                                    </div>

                                    <LoanSummaryCard loan={loan} />

                                    {sessionComplete && (
                                        <div className="mx-3 mb-2 p-2.5 rounded-xl bg-[#ecfdf5] border border-[#25D366] flex items-center gap-2 fade-in shrink-0">
                                            <i className="fa-brands fa-whatsapp text-lg text-[#25D366]"></i>
                                            <a href={WA_LINK} className="text-xs font-bold text-[#166534]">Open WhatsApp recap →</a>
                                        </div>
                                    )}

                                    <div className="flex-1 overflow-y-auto px-3 space-y-2 min-h-0">
                                        {isConnecting && <p className="text-xs text-gray-500 pl-1">Connecting with Agentforce…</p>}
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : ''} fade-in`}>
                                                {m.role === 'agent' && <img src={AGENTFORCE_ICON} alt="" className="w-6 h-6 mr-1.5 mt-1 object-contain shrink-0" />}
                                                <div className="max-w-[88%]">
                                                    <div className={`text-[12px] px-3 py-2 rounded-2xl leading-relaxed ${m.role === 'user' ? 'bg-[#00A3A1] text-white' : 'bg-white border border-gray-200'}`}
                                                        dangerouslySetInnerHTML={{ __html: m.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>') }} />
                                                    {m.options?.map((o, j) => (
                                                        <button key={j} type="button" disabled={waOfferChoice} onClick={() => handleWaOffer(o)}
                                                            className="mt-1.5 w-full text-left text-[11px] border border-[#00A3A1] rounded-lg px-3 py-2 bg-white">
                                                            <i className="fa-brands fa-whatsapp text-[#25D366] mr-1"></i>{o}
                                                        </button>
                                                    ))}
                                                    {m.type === 'whatsapp_handoff' && (
                                                        <a href={WA_LINK} className="mt-2 inline-flex gap-2 bg-[#25D366] text-white text-[11px] font-bold px-3 py-2 rounded-lg">
                                                            <i className="fa-brands fa-whatsapp"></i> Open WhatsApp
                                                        </a>
                                                    )}
                                                </div>
                                                {m.role === 'user' && <span className="w-6 h-6 ml-1.5 bg-blue-600 text-white rounded-full text-[9px] font-bold flex items-center justify-center shrink-0">M</span>}
                                            </div>
                                        ))}
                                        {isTyping && (
                                            <div className="flex justify-start mb-1 pl-8 fade-in">
                                                <img src={AGENTFORCE_ICON} alt="" className="w-6 h-6 mr-1.5 mt-1 object-contain shrink-0 opacity-80" />
                                                <div className="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm flex items-center gap-1.5">
                                                    <span className="typing-dot w-2 h-2 bg-[#94a3b8] rounded-full" />
                                                    <span className="typing-dot w-2 h-2 bg-[#94a3b8] rounded-full" />
                                                    <span className="typing-dot w-2 h-2 bg-[#94a3b8] rounded-full" />
                                                </div>
                                            </div>
                                        )}
                                        <div ref={chatEndRef} />
                                    </div>

                                    <div className="shrink-0 bg-[#f2f2f7] border-t border-gray-200">
                                        <div className="px-3 py-2 flex items-end gap-2">
                                            <div className={`flex-1 chat-input-mock px-3 py-2 flex items-center ${showInputCaret ? 'is-active' : ''}`}>
                                                <div className="chat-input-faux" aria-label="Message Agentforce">
                                                    {inputText ? (
                                                        <span className="chat-input-value">{inputText}</span>
                                                    ) : (
                                                        <span className="chat-input-placeholder">{inputPlaceholder}</span>
                                                    )}
                                                </div>
                                            </div>
                                            <button type="button" disabled={!inputText.trim()}
                                                className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${inputText.trim() ? 'bg-[#0B3D5C] text-white' : 'bg-gray-300 text-gray-500'}`}>
                                                <i className="fa-solid fa-paper-plane text-[10px]"></i>
                                            </button>
                                        </div>
                                        {keyboardVisible && <IOSKeyboard />}
                                        {!keyboardVisible && !sessionComplete && (
                                            <p className="text-center text-[9px] text-gray-400 pb-1">Press <strong>→</strong> or any key to type &amp; send · skip typing or agent reply</p>
                                        )}
                                        <HomeIndicator dark />
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
